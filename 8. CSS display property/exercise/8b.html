<!DOCTYPE HTML>

<html>
  <head>
    <style>
      .para{
        display: inline-block;
        width: 200px;
        vertical-align: middle;
      }

      .button-yes, 
      .button-no{
        vertical-align: middle;
      }
    </style>
  </head>

  <body>
    <p class="para">
      Thanks for chatting with our customer support. 
      Would you like to take our survey?
    </p>

    <button class="button-yes">Yes</button>

    <button class="button-no">No</button>
  </body>
</html>

<!DOCTYPE html>

<html>
  <head>
    <style>
      body{
        margin-left: 10px;
        margin-top: 10px;
      }

      .profile-picture{
        width: 50px;
        height: 50px;
        border-radius: 25px;
        vertical-align: middle;
        margin-right: 7px;
      }

      .text-box{
        border: none;
        border-width: 1px;
        vertical-align: middle;
        font-size: 17px;
        color: gray;
        width: 300px;
      }

      .tweet-button{
        background-color: #218cf0;
        color: white;
        font-weight: bold;
        border: none;
        border-radius: 23px;
        font-size: 17px;
        vertical-align: middle;
        padding-left: 12px;
        padding-right: 12px;
        padding-top: 5px;
        padding-bottom: 5px;
        cursor: pointer;
      }

      .card{
        width: 600px;
        padding-top: 10px;
        padding-left: 10px;
        padding-bottom: 10px;
        border-radius: 5px;
        margin-left: 10px;
        margin-top: 20px;
        box-shadow: 0px 0px 6px rgba(0, 0, 0, 0.33);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img class="profile-picture" src="./beautiful-shot-river-through-village-surrounded-by-hills-mountains-greenery_181624-41644.avif">
      <input class="text-box" placeholder="What's happenning?">
      <button class="tweet-button">Tweet</button>
    </div>
  </body>
</html>

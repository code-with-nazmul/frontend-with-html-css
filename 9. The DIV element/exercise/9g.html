<!DOCTYPE HTML>

<html>
  <head>
    <style>
      p{
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
      }
      .card{
        box-shadow: 0px 0 5px rgba(0, 0, 0, 0.30);
        width: 150px;
        /* height: 250px; */
        padding-bottom: 3px;
        display: inline-block;
        margin-left: 7px;
      }

      .cat-img{
        width: 150px;
        margin-bottom: 0;
      }

      .oliver{
        margin-top: 0;
        margin-bottom: 0;
        padding-left: 5px;
        font-size: 20px;
        font-weight: bold;
      }

      .friend{
        padding-left: 5px;
        margin-bottom: 8px;
        font-size: 14px;
        color: rgb(130, 130, 130);
      }

      .button-friend{
        margin-left: 5px;
        background-color: #4040e8;
        border: none;
        padding-left: 7px;
        padding-right: 7px;
        padding-top: 5px;
        padding-bottom: 5px;
        color: white;
        cursor: pointer;
        border-radius: 3px;
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img src="./cat.jpg" alt="" class="cat-img">
      <p class="oliver">Oliver</p>
      <p class="friend">2 mutual friends</p>
      <button class="button-friend">Add Friend</button>
    </div>

    <div class="card">
      <img src="./cat2.jpg" alt="" class="cat-img">
      <p class="oliver">Mimi</p>
      <p class="friend">3 mutual friends</p>
      <button class="button-friend">Add Friend</button>
    </div>

    <div class="card">
      <img src="./dog.jpg" alt="" class="cat-img">
      <p class="oliver">Rex</p>
      <p class="friend">4 mutual friends</p>
      <button class="button-friend">Add Friend</button>
    </div>
  </body>
</html>

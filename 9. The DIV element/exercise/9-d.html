<DOCTYPE html>

<html>
  <head>
    <style>
      .card{
        background-color: rgb(33, 33, 33);
        width: 360px;
        padding-left: 15px;
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .short{
        font-size: 20px;
        font-weight: bold;
        color: white;
      }

      .descriptive{
        color: rgb(230, 230, 230);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <p class="short">
        Install YouTube Music
      </p>

      <p class="descriptive">
        Add YouTube Music to your desktop to your desktop for quick
        and easy access
      </p>
    </div>
  </body>
</html>

<!DOCTYPE html>

<html>
  <head>
    <style>
      input{
        border-width: 1px;
        border-style: solid;
        border-color: rgb(200, 200, 200);
        padding-top: 12px;
        padding-bottom: 12px;
        padding-left: 16px;
        padding-right: 16px;
        border-radius: 8px;
        margin-bottom: 12px;
      }

      .first-name{
        width: 148px;
      }

      .last-name{
        width: 148px;
      }

      .email{
        display: block;
        width: 333px;
      }

      .button-sign-up{
        width: 365px;
        padding-left: 20px;
        border-radius: 8px;
        padding-top: 12px;
        padding-bottom: 12px;
        background-color: rgb(47, 127, 231);
        border: none;
        cursor: pointer;
        color: white;
        font-weight: bold;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <input class="first-name" placeholder="First name">
    <input class="last-name" placeholder="Last name">
    <input class="email" placeholder="Email">
    <button class="button-sign-up">Sign Up</button>
  </body>
</html>

<!DOCTYPE html>

<html>
  <head>
    <style>
      body{
        height: 3000px;
      }

      p{
        color: white;
      }

      .sidebar{
        display: flex;
        align-items: center;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
      }

      .left-section{
        display: flex;
        flex-direction: column;
        background-color: black;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        width: 55px;
        align-items: center;
      }

      .image{
        height: 45px;
        width: 45px;
        border-radius: 50%;
        margin-top: 7px;
      }

      .right-section{
        background-color: rgba(0, 0, 0, 0.75);
        position: fixed;
        left: 55px;
        top: 0;
        bottom: 0;
        width: 150px;
      }

      .r1{
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-left: 16px;
        padding-right: 16px;
      }

      .plus{
        font-size: 25px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <div class="left-section">
        <div><img class="image" src="./silver-tabby-cat-sitting-on-green-background-free-photo.jpg" alt=""></div>
        <div><img class="image" src="./silver-tabby-cat-sitting-on-green-background-free-photo.jpg" alt=""></div>
        <div><img class="image" src="./silver-tabby-cat-sitting-on-green-background-free-photo.jpg" alt=""></div>
      </div>
      <div class="right-section">
        <div class="r1">
          <div><p>INFO</p></div>
          <div><p class="plus">+</p></div>
        </div>
      </div>
    </div>
  </body>
</html>

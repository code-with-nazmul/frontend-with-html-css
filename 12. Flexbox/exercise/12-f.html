<!DOCTYPE html>

<html>
  <head>
    <style>
      .header{
        display: flex;
        flex-direction: row;
        background-color: rgb(120, 82, 178);
        color: white;
        justify-content: space-between;
        align-items: center;
        padding-left: 15px;
        padding-right: 15px;
      }

      .home{
        font-weight: bold;
      }

      .input-box{
        width: 300px;
        border: none;
        border-radius: 15px;
        margin-top: 12px;
        margin-bottom: 12px;
        height: 30px;
        padding-left: 20px;
      }

      button{
        background-color: rgb(120, 82, 178);
        color: white;
        font-size: 16px;
        border: 1px solid white;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 15px;
        padding-right: 15px;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <div class="home">Home</div>
      <input type="text" class="input-box">
      <button>Download</button>
    </div>
  </body>
</html>

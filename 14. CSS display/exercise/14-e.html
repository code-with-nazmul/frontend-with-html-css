<!DOCTYPE html>

<html>
  <head>
    <style>
      body{
        height: 3000px;
        /* background-color: green; */
      }

      .header{
        /* background-color: rgba(0, 0, 0, 0.50); */
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 100px;
      }

      .left-side{
        display: flex;
        margin-left: 35px;
        justify-content: center;
        align-items: center;
      }

      .profile{
        height: 35px;
        width: 35px;
        border-radius: 50%;
      }

      .name-div{
        margin-left: 10px;
      }

      .name{
        font-family: Arial;
        font-size: 15px;
        font-weight: bold;
      }

      .right-side{
        margin-right: 15px;
      }

      .add-friend{
        background-color: rgb(71, 71, 232);
        color: white;
        border: none;
        border-radius: 5px;
        font-family: Arial;
        font-weight: bold;
        font-size: 16px;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 10px;
        padding-right: 10px;
        margin-right: 7px;
      }

      .message{
        font-size: 16px;
        font-family: Arial;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 10px;
        padding-right: 10px;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <div class="left-side">
        <div class="image">
          <img class="profile" src="./silver-tabby-cat-sitting-on-green-background-free-photo.jpg" alt="">
        </div>
        <div class="name-div">
          <p class="name">Oliver Cat</p>
        </div>
      </div>
      <div class="right-side">
        <button class="add-friend">Add friend</button>
        <button class="message">Message</button>
      </div>
    </div>
  </body>
</html>

<!DOCTYPE html>

<html>
  <head>
    <style>
      body{
        font-family: Arial;
        font-size: 18px;
      }

      .container{
        width: 300px;
        border: 1px solid rgb(200, 200, 200);
        border-radius: 5px;
      }

      .flexbox{
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding-left: 6px;
        padding-top: 8px;
        padding-bottom: 5px;
        padding-right: 10px;
      }

      .notification{
        background-color: rgb(49, 109, 245);
        color: white;
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 3px;
        padding-bottom: 3px;
        border-radius: 30px;
        font-weight: bold;
        font-size: 14px;  
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="flexbox">
        <div class="name">Home</div>
        <div class="notification">14</div>
      </div>
      <div class="flexbox">
        <div class="name">Notifications</div>
        <div class="notification">3</div>
      </div>
      <div class="flexbox">
        <div class="name">Messages</div>
        <div class="notification">5</div>
      </div>
    </div>
  </body>
</html>

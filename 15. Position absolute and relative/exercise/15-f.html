<!DOCTYPE html>

<html>
  <head>
    <style>
      .product-container{
        position: relative;
        display: inline-block;
      }

      .product-image{
        height: 300px;
        width: 300px;
        object-fit: cover;
      }

      .promotion{
        position: absolute;
        top: 10px;
        right: 0;
        background-color: black;
        color: white;
        font-size: 20px;
        padding-left: 5px;
        padding-right: 7px;
        padding-top: 4px;
        padding-bottom: 4px;
      }

      .bottom-overlay{
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 80px;
        background-color: rgba(255, 255, 255, 0.8);
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
      }

      .add-to-cart-button{
        border-width: 1px;
        border-style: solid;
        border-color: black;
        background-color: white;
        color: black;
        padding-left: 12px;
        padding-right: 12px;
        padding-top: 8px;
        padding-bottom: 8px;
      }
    </style>
  </head>

  <body>
    <div class="product-container">
      <img src="./shirt.jpg" class="product-image">
      <div class="promotion">20% OFF</div>
      <div class="bottom-overlay">
        <button class="add-to-cart-button">
          Add to Cart
        </button>
      </div>
    </div>
  </body>
</html>

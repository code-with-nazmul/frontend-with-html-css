<!DOCTYPE html>

<html>
  <head>
    <style>
      .product-container{
        position: relative;
        display: inline-block;
      }

      .product-image{
        height: 300px;
        width: 300px;
        object-fit: cover;
      }

      .promotion{
        position: absolute;
        top: 10px;
        right: 0;
        background-color: black;
        color: white;
        font-size: 20px;
        padding-left: 5px;
        padding-right: 7px;
        padding-top: 4px;
        padding-bottom: 4px;
        /* top: 15px;
        right: 965px; */
      }
    </style>
  </head>

  <body>
    <div class="product-container">
      <img src="./shirt.jpg" class="product-image">
      <div class="promotion">20% OFF</div>
    </div>
  </body>
</html>

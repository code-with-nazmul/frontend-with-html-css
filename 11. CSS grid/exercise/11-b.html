<!DOCTYPE html>

<html>
  <head>
    <style>
      .outer-div{
        display: grid;
        grid-template-columns: 50px 1fr 75px;
      }

      .div-1{
        background-color: lightblue;
      }

      .div-2{
        background-color: lightpink;
      }

      .div-3{
        background-color: lightblue;
      }
    </style>
  </head>

  <body>
    <div class="outer-div">
      <div class="div-1">
        col1
      </div>

      <div class="div-2">
        col2
      </div>

      <div class="div-3">
        col3
      </div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <style>
      .logo-div,
      .input-div,
      .button-div{
        text-align: center;
      }

      .input-box{
        border: none;
        color: rgb(200, 200, 200);
        font-size: 16px;
        margin-bottom: 30px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        width: 500px;
        padding-left: 15px;
        padding-top: 10px;
        padding-bottom: 10px;
        border-radius: 30px;
      }

      .search-button{
        font-size: 16px;
        margin-right: 10px;
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 7px;
        padding-bottom: 7px;
        border: none;
      }

      .feel-button{
        font-size: 16px;
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 7px;
        padding-bottom: 7px;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="logo-div">
      <img class="google-logo" src="./images.png">
    </div>
    
    <div class="input-div">
      <input class="input-box" type="text" placeholder="Search Google or type a URL">
    </div>

    <div class="button-div">
      <button class="search-button">Google search</button>
      <button class="feel-button">I'm Feeling Lucky</button>
    </div>
    
  </body>
</html>

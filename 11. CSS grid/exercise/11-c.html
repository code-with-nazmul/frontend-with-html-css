<!DOCTYPE html>

<html>
  <head>
    <style>
      .container{
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        column-gap: 20px;
        row-gap: 10px;
      }

      .col-1,
      .col-2,
      .col-3,
      .col-4{
        background-color: lightpink;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="col-1">col1</div>
      <div class="col-2">col2</div>
      <div class="col-3">col3</div>
      <div class="col-4">col4</div>
      <div class="col-1">col1</div>
      <div class="col-2">col2</div>
      <div class="col-3">col3</div>
      <div class="col-4">col4</div>
    </div>
  </body>
</html>

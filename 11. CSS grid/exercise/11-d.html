<!DOCTYPE html>

<html>
  <head>
    <style>
      p{
        margin-top: 0px;
        margin-bottom: 0px;
        font-family: Arial;
      }

      .container{
        display: grid;
        grid-template-columns: 200px 200px 200px;
        column-gap: 20px;
      }

      .profile{
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        vertical-align: top;
      }

      .profile-pic{
        /* height: 200px; */
        width: 200px;
        object-fit: cover;
      }

      .name{
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 5px;
        margin-top: 7px;
        margin-left: 8px;
      }

      .rounded-pic{
        height: 30px;
        width: 30px;
        border-radius: 50%;
      }

      .pic-mutual-section{
        display: grid;
        grid-template-columns: 35px 1fr;
        align-items: center;
        margin-bottom: 12px;
        margin-left: 8px;
      }

      .friend-count{
        color: gray;
        font-size: 16px;
      }

      .add-button{
        margin-left: 8px;
        border: none;
        font-size: 18px;
        background-color: rgb(24, 119, 242);
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 12px;
        padding-right: 12px;
        border-radius: 5px;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="profile">
        <img class="profile-pic" src="./cat.jpg" alt="">
        <p class="name">Oliver</p>
        <div class="pic-mutual-section">
          <img class="rounded-pic" src="./cat.jpg" alt="">
          <p class="friend-count">2 mutual friends</p>
        </div>
        <button class="add-button">Add friend</button>
      </div>

      <div class="profile">
        <img class="profile-pic" src="./cat2.jpg" alt="">
        <p class="name">Mimi</p>
        <div class="pic-mutual-section">
          <img class="rounded-pic" src="./cat.jpg" alt="">
          <p class="friend-count">3 mutual friends</p>
        </div>
        <button class="add-button">Add friend</button>
      </div>

      <div class="profile">
        <img class="profile-pic" src="./dog.jpg" alt="">
        <p class="name">Rex</p>
        <div class="pic-mutual-section">
          <img class="rounded-pic" src="./cat.jpg" alt="">
          <p class="friend-count">4 mutual friends</p>
        </div>
        <button class="add-button">Add friend</button>
      </div>
    </div>
  </body>
</html>

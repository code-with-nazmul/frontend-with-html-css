<!DOCTYPE html>

<html>
  <head>
    <style>
      .outer-div{
        display: grid;
        grid-template-columns: 200px 75px;
      }
      .div-1{
        background-color: lightblue;
      }

      .div-2{
        background-color: lightpink;
      }
    </style>
  </head>

  <body>
    <div class="outer-div">
      <div class="div-1">200px</div>
      <div class="div-2">75px</div>
    </div>
  </body>
</html>

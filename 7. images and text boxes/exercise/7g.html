<!DOCTYPE html>

<html>
  <head>
    <style>
      body{
        margin-left: 10px;
        margin-top: 10px;
      }

      .profile-picture{
        width: 50px;
        height: 50px;
        border-radius: 25px;
        vertical-align: middle;
        margin-right: 7px;
      }

      .text-box{
        border: none;
        border-width: 1px;
        vertical-align: middle;
        font-size: 17px;
        color: gray;
        width: 300px;
      }

      .tweet-button{
        background-color: #218cf0;
        color: white;
        font-weight: bold;
        border: none;
        border-radius: 23px;
        font-size: 17px;
        vertical-align: middle;
        padding-left: 12px;
        padding-right: 12px;
        padding-top: 5px;
        padding-bottom: 5px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <img class="profile-picture" src="../images/beautiful-shot-river-through-village-surrounded-by-hills-mountains-greenery_181624-41644.avif">
    <input class="text-box" placeholder="What's happenning?">
    <button class="tweet-button">Tweet</button>
  </body>
</html>

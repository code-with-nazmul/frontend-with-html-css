<style>
  button{
    font-size: 25px;
    background-color: green;
    border: none;
    padding-left: 20px;
    padding-right: 20px;
    padding-top: 10px;
    padding-bottom: 10px;
    color: white;
    cursor: pointer;

    transition: padding-top 0.30s, padding-bottom 0.30s,
      padding-left 0.30s, padding-right 0.30s, font-size 0.30s;
  }
  button:hover{
    padding-top: 18px;
    padding-bottom: 18px;
    padding-left: 28px;
    padding-right: 28px;
    font-size: 30px;
  }
</style>

<button>
  Stretch
</button>

<!DOCTYPE html>

<html>
  <head>
   <style>
    p{
      font-family: Arial;
      margin-top: 0;
      margin-bottom: 0;
    }

    .row{
      display: flex;
      flex-direction: row;
      align-items: center;
      margin-bottom: 20px;
    }

    .profile-pic{
      height: 50px;
      width: 50px;
      object-fit: cover;
      border-radius: 50%;
      margin-right: 15px;
    }

    .info{
      width: 200px;
    }

    .name{
      font-weight: bold;
      margin-bottom: 3px;
    }

    .handle{
      color: gray; 
      margin-bottom: 3px;
    }

    .category{
      color: gray;
      margin-bottom: 3px;
      font-size: 14px;
    }

    .follow-button{
      border: none;
      padding-left: 9px;
      padding-right: 9px;
      padding-top: 12px;
      padding-bottom: 12px;
      font-size: 16px;
      background-color: rgb(29, 155, 240);
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
   </style> 
  </head>

  <body>
    <div class="row">
      <img class="profile-pic" src="./cat.jpg" alt="">
      <div class="info">
        <p class="name">oliver</p>
        <p class="handle">the cat</p>
        <p class="category">Popular</p>
      </div>
      <button class="follow-button">Follow</button>
    </div>

    <div class="row">
      <img class="profile-pic" src="./cat.jpg" alt="">
      <div class="info">
        <p class="name">Mimi</p>
        <p class="handle">Sleepy cat</p>
        <p class="category">Popular</p>
      </div>
      <button class="follow-button">Follow</button>
    </div>

    <div class="row">
      <img class="profile-pic" src="./cat.jpg" alt="">
      <div class="info">
        <p class="name">Rex</p>
        <p class="handle">Happy Bulldog</p>
        <p class="category">Popular</p>
      </div>
      <button class="follow-button">Follow</button>
    </div>
  </body>
</html>

<!DOCTYPE html>

<html>
  <head>
    <style>
      .gray-box{
        background-color: gray;
        width: 320px;
        height: 180px;
        margin-left: 100px;
        margin-top: 100px;
        position: fixed;
      }

      .cross-button{
        background-color: black;
        color: white;
        position: absolute;
        padding-left: 6px;
        padding-right: 6px;
        padding-top: 4px;
        padding-bottom: 4px;
        border-radius: 50%;
        font-size: 20px;
        top: -7px;
        left: -7px;
      }
    </style>
  </head>

  <body>
    <div class="gray-box">
      <div class="cross-button">X</div>
    </div>
  </body>
</html>

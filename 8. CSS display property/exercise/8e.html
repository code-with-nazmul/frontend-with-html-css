<!DOCTYPE HTML>

<html>
  <head>
    <style>
      .request-a-ride{
        font-size: 30px;
        margin-bottom: 25px;
      }

      .pickup{
        display: block;
        margin-bottom: 6px;
        border: none;
        font-size: 16px;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 10px;
        background-color: rgb(240, 240, 240);
        width: 270px;
      }

      .destination{
        display: block;
        border: none;
        margin-bottom: 25px;
        font-size: 16px;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 10px;
        background-color: rgb(240, 240, 240);
        width: 270px;
      }

      .button-req{
        background-color: black;
        font-size: 16px;
        color: white;
        padding-left: 10px;
        padding-top: 5px;
        padding-bottom: 5px;
        padding-right: 10px;
        border: none;
        margin-right: 10px;
        cursor: pointer;
      }

      .button-schedule{
        background-color: rgb(240, 240, 240);
        font-size: 16px;
        color: black;
        padding-left: 10px;
        padding-top: 5px;
        padding-bottom: 5px;
        padding-right: 10px;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <p class="request-a-ride">
      Request a ride now
    </p>

    <input class="pickup" placeholder="Enter pickup location">

    <input class="destination" placeholder="Enter destination">

    <button class="button-req">Request now</button>
    
    <button class="button-schedule">Schedule for later</button>
  </body>
</html>

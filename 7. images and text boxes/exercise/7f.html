<!DOCTYPE html>

<html>
  <head>
    <title>Signup - LinkedIn</title>
    <style>
      p{
        margin-top: 0;
        margin-bottom: 0;
      }
      .email-para{
        font-size: 15px;
        color: rgb(101, 94, 94);
        margin-top: 7px;
        margin-bottom: 5px;
      }

      .email-input{
        font-size: 20px;
        border: solid;
        border-width: 2px;
        margin-bottom: 15px;
        border-radius: 5px;
        border-color: gray;
        margin-bottom: 15px;
        width: 348px;
      }

      .agree-text{
        width: 352px;
        color: gray;
        margin-bottom: 15px;
        /* border: solid; */
      }

      .button-join{
        width: 352px;
        border: none;
        font-size: 17px;
        text-align: center;
        background-color: rgb(51 169 255);
        padding-top: 10px;
        padding-bottom: 10px;
        border-radius: 25px;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <p class="email-para">Email</p>
    
    <input class="email-input">

    <p class="agree-text">By clicking Agree &#38; Join, you agree to 
      Privacy Policy.
    </p>

    <button class="button-join">
      Agree & Join
    </button>
  </body>
</html>
